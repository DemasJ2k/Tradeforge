services:
  # Backend (FastAPI)
  - type: web
    name: flowrexalgo-api
    runtime: python
    plan: standard
    repo: https://github.com/DemasJ2k/Tradeforge.git
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tradeforge-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: "https://flowrexalgo.onrender.com"
      - key: RENDER_EXTERNAL_URL
        value: "https://flowrexalgo-api.onrender.com"
      - key: DEBUG
        value: "false"
      - key: UPLOAD_DIR
        value: "/tmp/uploads"
      - key: SMTP_SERVER
        value: "smtp.gmail.com"
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: NOTIFICATION_EMAIL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      # Market data APIs
      - key: FINNHUB_API_KEY
        sync: false
      - key: ALPHAVANTAGE_API_KEY
        sync: false
      - key: DATABENTO_API_KEY
        sync: false
      # cTrader OAuth2
      - key: CTRADER_CLIENT_ID
        sync: false
      - key: CTRADER_CLIENT_SECRET
        sync: false
      # Platform LLM (AI chat features)
      - key: PLATFORM_LLM_API_KEY
        sync: false
      # MT5 Remote Bridge
      - key: MT5_BRIDGE_URL
        sync: false
      - key: MT5_BRIDGE_KEY
        sync: false

  # Frontend (Next.js)
  - type: web
    name: flowrexalgo
    runtime: node
    plan: standard
    repo: https://github.com/DemasJ2k/Tradeforge.git
    rootDir: frontend
    buildCommand: npm install && npm run build && cp -r public .next/standalone/ && cp -r .next/static .next/standalone/.next/static
    startCommand: node .next/standalone/server.js
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: "https://flowrexalgo-api.onrender.com"

databases:
  - name: tradeforge-db
    plan: free
